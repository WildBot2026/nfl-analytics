      }
    }
    
    aeHtml += '<div class="as"><h3>🤖 AI Analysis</h3>'+
      '<div class="pr"><div class="w">🏆 '+winner.abbr+' win '+s0+'-'+s1+' ('+spread+' pt spread)</div>'+
      '<div class="c">Total points: '+totalPts+' | '+(g.broadcast?'📺 '+g.broadcast:'')+'</div></div>'+
      '<div style="font-size:.78em;line-height:1.6;margin-top:6px">'+
      (qb0?'<p><b>🎯 QB Duel:</b> '+tabbr0+' - '+qb0+'</p>':'')+
      (qb1?'<p><b>🎯 QB Duel:</b> '+tabbr1+' - '+qb1+'</p>':'')+
      '<p><b>📍 Venue:</b> '+g.venue+' | Attendance: '+(g.attendance||'N/A')+'</p>'+
      '<p><b>🔍 Verdict:</b> '+winner.name+' prevailed over '+loser.name+'. Final spread: '+spread+' pts.</p></div></div>';
    
    document.getElementById('ae').innerHTML = aeHtml;
  }
}
</script>
</body>
</html>
